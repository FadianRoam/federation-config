name: Deploy Federation Config

on:
  push:
    branches: [main]
    paths:
      - 'members/**'
      - 'federations/**'
      - 'scripts/**'

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SOPS + AGE
        run: |
          curl -sLO https://github.com/getsops/sops/releases/download/v3.9.4/sops-v3.9.4.linux.amd64
          sudo mv sops-v3.9.4.linux.amd64 /usr/local/bin/sops && sudo chmod +x /usr/local/bin/sops
          sudo apt-get install -y -qq age

      - name: Decrypt member secrets
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          mkdir -p members-dec
          for f in members/*.yml; do
            sops decrypt "$f" > "members-dec/$(basename "$f")"
          done

      - name: Generate configs
        run: |
          pip install -q pyyaml
          python3 scripts/generate-configs.py members-dec out

      - name: Upload configs
        uses: actions/upload-artifact@v4
        with:
          name: federation-configs
          path: out/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: apac
            host: 142.249.114.27
            port: 22
    steps:
      - uses: actions/checkout@v4

      - name: Download configs
        uses: actions/download-artifact@v4
        with:
          name: federation-configs
          path: out

      - name: Deploy to ${{ matrix.name }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ matrix.host }}
          port: ${{ matrix.port }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "out/*,scripts/deploy.sh"
          target: "/tmp/federation-deploy"
          strip_components: 0

      - name: Apply configs
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ matrix.host }}
          port: ${{ matrix.port }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /tmp/federation-deploy
            bash scripts/deploy.sh out
            rm -rf /tmp/federation-deploy
