name: Validate Federation Config

# Runs on every PR and push to main that touches member/federation files.
# IMPORTANT: This workflow intentionally does NOT decrypt secrets and does NOT
# deploy to any host. Deployment is handled by pull-deploy.sh running on each
# proxy node via a systemd timer. Secrets never leave the proxy.

on:
  pull_request:
    paths:
      - 'members/**'
      - 'federations/**'
      - 'scripts/**'
      - '.sops.yaml'
  push:
    branches: [main]
    paths:
      - 'members/**'
      - 'federations/**'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  validate:
    name: Schema & Encryption Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -q pyyaml

      - name: Check all member files are SOPS-encrypted
        run: |
          python3 scripts/validate-schema.py --check-encrypted members/

      - name: Check no plaintext shared_secret committed
        # encrypted_regex ensures only shared_secret is encrypted, but
        # double-check no raw hex/random string slipped through unencrypted.
        run: |
          if grep -rn '^  shared_secret:' members/ | grep -v 'ENC\['; then
            echo "❌ Plaintext shared_secret found — run: sops -e -i members/<file>.yml"
            exit 1
          fi
          echo "✓ No plaintext secrets detected."

      - name: Verify .sops.yaml covers all member files
        run: python3 scripts/validate-schema.py --check-sops-coverage members/

      - name: Lint generate-configs.py (Python syntax)
        run: python3 -m py_compile scripts/generate-configs.py && echo "✓ generate-configs.py OK"

      - name: Lint validate-schema.py (Python syntax)
        run: python3 -m py_compile scripts/validate-schema.py && echo "✓ validate-schema.py OK"
